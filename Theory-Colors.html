<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollywood Action | Color Experience</title>
    <style>
        :root {
            --primary-color: #5c0b0b;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-color);
        }

        /* Container estilo Glassmorphism */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .color-display {
            background: rgba(0, 0, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-bottom: 2rem;
            display: block;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            filter: brightness(1.2);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Color Theory</h1>
        <p>A cor atual é:</p>
        <span class="color-display" id="colorCode">#F5F7FA</span>
        
        <button id="colorButton">Gerar Nova Experiência</button>
    </div>

    <script>
        const button = document.getElementById('colorButton');
        const colorText = document.getElementById('colorCode');

        // Função para gerar cores hexadecimais aleatórias de forma profissional
        function generateRandomColor() {
            const chars = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += chars[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        button.addEventListener('click', () => {
            const color1 = generateRandomColor();
            const color2 = generateRandomColor();
            
            // Criando um gradiente dinâmico para o fundo
            const newGradient = `linear-gradient(135deg, ${color1} 0%, ${color2} 100%)`;
            
            document.body.style.background = newGradient;
            colorText.textContent = `${color1} → ${color2}`;
            
            // Feedback tátil visual: muda a cor do botão para combinar com uma das novas cores
            button.style.backgroundColor = color1;
        });
    </script>
</body>
</html>
